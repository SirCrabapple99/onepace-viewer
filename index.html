<!doctype html>
<html>
  <head>
    <title>One Pace Viewer</title>
    <link href="style.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <div id="videoHolder">
      <video id="video">
        <!--https://pixeldrain.net/api/file/eGQDZANW-->
        <source src="https://cdn.jsdelivr.net/npm/big-buck-bunny-1080p@0.0.6/video.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <div id="timeline" class="videoControls"></div>
      <div id="timelineDrag" class="videoControls"></div> 
      <img id="rewind" class="videoControls" onclick="backward()" src="./Assets/backward-solid-full.svg"></img>
      <img id="fastForward" class="videoControls" onclick="forward()" src="./Assets/forward-solid-full.svg"></img>
      <img id="playPause" class="videoControls" onclick="playPause()" src="./Assets/play-solid-full.svg"></img>
    <script src="videocontrols.js"></script>
    <script src="arcfetch.js"></script>
  </body>
</html>
