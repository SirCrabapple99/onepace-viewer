<!doctype html>
<html>
  <head>
    <title>One Pace Viewer</title>
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <div id="videoHolder">
      <video id="video">
        <!--https://pixeldrain.net/api/file/eGQDZANW-->
        <source src="https://cdn.jsdelivr.net/npm/big-buck-bunny-1080p@0.0.6/video.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <div id="timeline" class="videoControls"></div>
      <div id="timelineDrag" class="videoControls"></div> 
      <img id="fastForward" class="videoControls" onclick="forward()" width="5%" src="https://www.svgrepo.com/show/390016/media-player-ui-button-forward.svg">
      <img id="rewind" class="videoControls" onclick="backward()" width="5%" src="https://www.svgrepo.com/show/390016/media-player-ui-button-forward.svg">
      <img id="playPause" class="videoControls" onclick="playPause()" width="5%" src="https://www.svgrepo.com/show/390019/media-player-ui-button-play.svg">
    </div>
    <script src="videocontrols.js"></script>
  </body>
</html>
